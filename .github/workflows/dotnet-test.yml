name: .NET Tests

on:
  push:
    branches: [ "main", "master" ] # รันเมื่อ push โค้ดเข้ากิ่งหลัก
  pull_request:
    branches: [ "main", "master" ] # รันเมื่อมีการขอ merge โค้ด

jobs:
  build-and-test:
    # 🌟 สำคัญมาก: ต้องใช้ Windows เพราะโปรเจกต์เราเป็น net10.0-windows (WinForms)
    runs-on: windows-latest 

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x' 

    - name: Restore dependencies
      # เพิ่ม path ไปยังไฟล์ test project (หรือไฟล์ .slnx ถ้าไฟล์ solution ของคุณครอบคลุม test project ด้วย)
      run: dotnet restore GTYApp.Tests/GTYApp.Tests.csproj

    - name: Build Project
      # เพิ่ม path ไปยังไฟล์ test project 
      run: dotnet build GTYApp.Tests/GTYApp.Tests.csproj --no-restore

    - name: Run Tests
      # เพิ่ม path ไปยังไฟล์ test project 
      run: dotnet test GTYApp.Tests/GTYApp.Tests.csproj --no-build --verbosity normal
